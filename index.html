<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>RideVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-0: #07090c;
  --bg-1: #0c1117;
  --bg-2: #131a22;
  --line: rgba(255,255,255,0.08);
  --line-strong: rgba(255,255,255,0.16);
  --fg: #e7ecf3;
  --fg-dim: #8a95a5;
  --fg-mute: #5a6470;
  --accent: #b6ff3c;
  --accent-soft: rgba(182,255,60,0.12);
  --accent-glow: rgba(182,255,60,0.45);
  --danger: #ff6a6a;
  --green: #b6ff3c;
  --red: #ff6a6a;
  --yellow: #ffb547;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: "Space Grotesk", system-ui, sans-serif;
  background: var(--bg-0);
  color: var(--fg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  min-height: 100dvh;
}

/* ── Sections ── */
.section { display: none; }
.section.visible { display: block; }
#sec-login { height: 100dvh; overflow: hidden; }
#sec-connect, #sec-controls {
  min-height: 100dvh;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.25rem 3rem;
}
#sec-connect.visible, #sec-controls.visible { display: flex; }

/* ── Background ── */
.bg {
  position: fixed; inset: 0; z-index: 0; overflow: hidden;
  background:
    radial-gradient(1200px 800px at 75% 20%, rgba(182,255,60,0.08), transparent 60%),
    radial-gradient(900px 700px at 20% 90%, rgba(60,140,255,0.06), transparent 60%),
    linear-gradient(180deg, #06080b 0%, #0a0e13 60%, #060809 100%);
}
.bg-grid {
  position: absolute; inset: -2px;
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 56px 56px;
  mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, #000 40%, transparent 100%);
  opacity: 0.55;
}
.bg-scan {
  position: absolute; inset: 0;
  background: repeating-linear-gradient(to bottom, rgba(255,255,255,0.014) 0 2px, transparent 2px 4px);
  pointer-events: none;
}
.orb {
  position: absolute;
  width: 520px; height: 520px;
  left: -160px; top: -160px;
  border-radius: 50%;
  background: radial-gradient(circle at 50% 50%, rgba(182,255,60,0.18), transparent 60%);
  filter: blur(20px);
  animation: drift 18s ease-in-out infinite alternate;
}
@keyframes drift { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(80px,60px) scale(1.1); } }

.scooter-wrap {
  position: absolute; right: -120px; bottom: -60px;
  width: 1100px; height: 620px;
  pointer-events: none;
  filter: drop-shadow(0 30px 80px rgba(182,255,60,0.08));
  opacity: 0.85;
}
.scooter-wrap svg { width: 100%; height: 100%; display: block; }

/* ── Topbar ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 5;
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 32px;
  pointer-events: none;
}
.topbar > * { pointer-events: auto; }
.brand { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 16px; }
.brand-mark {
  width: 24px; height: 24px;
  display: grid; place-items: center;
  border-radius: 6px;
  background: var(--accent); color: #07090c;
  font-weight: 700; font-size: 13px;
  box-shadow: 0 0 24px var(--accent-glow);
}
.brand-name b { color: var(--accent); font-weight: 600; }
.top-right {
  display: flex; align-items: center; gap: 16px;
  color: var(--fg-mute);
  font-size: 12px; font-family: "JetBrains Mono", monospace;
  letter-spacing: 0.04em; text-transform: uppercase;
}
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 12px var(--accent-glow);
  display: inline-block; margin-right: 6px;
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

/* ── Status pill ── */
.status-pill {
  position: fixed; right: 24px; bottom: 24px; z-index: 4;
  display: inline-flex; align-items: center; gap: 10px;
  padding: 9px 14px 9px 12px;
  background: rgba(8,12,16,0.7);
  border: 1px solid var(--line-strong); border-radius: 99px;
  color: var(--fg); font: 500 12px/1 "Space Grotesk", sans-serif;
  backdrop-filter: blur(12px); cursor: pointer;
  transition: border-color .2s;
}
.status-pill:hover { border-color: var(--accent); }
.status-pill-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 10px var(--accent-glow);
  position: relative;
}
.status-pill-dot::after {
  content: ""; position: absolute; inset: -4px;
  border-radius: 50%; border: 1px solid var(--accent);
  opacity: 0.5; animation: ping 2.2s ease-out infinite;
}
@keyframes ping { 0% { transform: scale(0.6); opacity: 0.6; } 100% { transform: scale(1.6); opacity: 0; } }
.status-pill-meta {
  color: var(--fg-mute); font-family: "JetBrains Mono", monospace;
  font-size: 10.5px; letter-spacing: 0.04em;
  padding-left: 10px; border-left: 1px solid var(--line);
}

/* ── Battery pill (corner, controls screen) ── */
.bat-pill {
  position: fixed; right: 24px; bottom: 24px; z-index: 4;
  display: none; align-items: center; gap: 8px;
  padding: 8px 14px 8px 11px;
  background: rgba(8,12,16,0.82);
  border: 1px solid var(--line-strong); border-radius: 99px;
  color: var(--fg); font: 600 13px/1 "Space Grotesk", sans-serif;
  backdrop-filter: blur(12px);
  transition: border-color .3s;
}
.bat-pill.visible { display: inline-flex; }
.bat-pill-icon { display: flex; align-items: center; color: var(--accent); }
.bat-pill-pct { font-family: "JetBrains Mono", monospace; font-size: 13px; letter-spacing: 0.03em; }
.bat-pill-bar {
  width: 32px; height: 5px; background: rgba(255,255,255,0.08);
  border-radius: 99px; overflow: hidden;
}
.bat-pill-fill { height: 100%; border-radius: 99px; background: var(--accent); transition: width .7s ease, background .5s; }

/* ── Login stage ── */
.stage {
  position: relative; z-index: 2;
  height: 100vh;
  display: grid; place-items: center;
  padding: 80px 24px;
}
.hero {
  position: relative;
  width: min(440px, 100%);
  display: flex; flex-direction: column; align-items: center;
}
.wordmark {
  font-weight: 700;
  font-size: clamp(56px, 9vw, 96px);
  line-height: 0.95; letter-spacing: -0.04em;
  text-align: center; margin: 0 0 6px;
  background: linear-gradient(180deg, #fff 0%, #c8d0dc 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.wordmark .v { color: var(--accent); -webkit-text-fill-color: var(--accent); text-shadow: 0 0 30px var(--accent-glow); }
.tagline {
  font-family: "JetBrains Mono", monospace;
  font-size: 11px; letter-spacing: 0.32em;
  color: var(--fg-mute); text-transform: uppercase;
  margin: 0 0 38px;
  display: flex; align-items: center; gap: 10px;
}
.tagline::before, .tagline::after {
  content: ""; height: 1px; flex: 1;
  background: linear-gradient(90deg, transparent, var(--line-strong), transparent);
  min-width: 32px;
}

/* ── Login card ── */
.card-login {
  width: 100%;
  background: linear-gradient(180deg, rgba(20,26,34,0.78), rgba(12,17,23,0.78));
  border: 1px solid var(--line); border-radius: 18px;
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 30px 80px rgba(0,0,0,0.55);
  overflow: hidden;
}
.panel { padding: 28px 28px 26px; }
.label-row {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 10px;
}
.label {
  font-family: "JetBrains Mono", monospace;
  font-size: 10px; letter-spacing: 0.22em;
  color: var(--fg-dim); text-transform: uppercase;
}
.label-help {
  font-size: 11px; color: var(--fg-mute);
  background: none; border: 0; cursor: pointer;
  font-family: "JetBrains Mono", monospace;
  letter-spacing: 0.08em; text-transform: uppercase;
}
.label-help:hover { color: var(--accent); }

.input-shell {
  position: relative; border: 1px solid var(--line-strong); border-radius: 12px;
  background: rgba(7,9,12,0.6);
  transition: border-color .2s, box-shadow .2s;
  display: flex; align-items: stretch;
}
.input-shell:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.input-shell.error { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(255,106,106,0.12); }
.input-shell.success { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.input-main {
  flex: 1; background: transparent; border: 0; outline: 0;
  padding: 14px 12px; color: var(--fg);
  font-family: "JetBrains Mono", monospace;
  font-size: 14px; letter-spacing: 0.04em; min-width: 0;
}
.input-main::placeholder { color: var(--fg-mute); letter-spacing: 0.16em; }
.input-action {
  background: none; border: 0; cursor: pointer;
  padding: 0 14px; color: var(--fg-mute);
  display: grid; place-items: center; transition: color .2s;
}
.input-action:hover { color: var(--fg); }

.meter {
  height: 3px; margin-top: 10px;
  background: rgba(255,255,255,0.05);
  border-radius: 99px; overflow: hidden;
  display: flex; gap: 3px;
}
.meter span { flex: 1; background: rgba(255,255,255,0.06); border-radius: 99px; transition: background .25s; }
.meter span.on { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

.hint {
  margin-top: 12px;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; color: var(--fg-mute);
  font-family: "JetBrains Mono", monospace; letter-spacing: 0.04em;
}
.hint .err { color: var(--danger); }
.hint .ok  { color: var(--accent); }

.submit {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; margin-top: 22px; padding: 14px 18px;
  background: var(--accent); color: #07090c;
  border: 0; border-radius: 12px;
  font: inherit; font-weight: 600; font-size: 14px; letter-spacing: 0.02em;
  cursor: pointer; transition: transform .12s, box-shadow .2s, filter .2s;
  box-shadow: 0 12px 40px rgba(182,255,60,0.18), 0 0 0 1px rgba(255,255,255,0.06) inset;
  position: relative; overflow: hidden;
}
.submit:hover { filter: brightness(1.05); box-shadow: 0 16px 48px rgba(182,255,60,0.28); }
.submit:active { transform: translateY(1px); }
.submit[disabled] { opacity: 0.5; cursor: not-allowed; }
.submit .arrow { transition: transform .2s; }
.submit:hover .arrow { transform: translateX(3px); }
.submit.loading { color: transparent; }
.submit .spinner-btn {
  position: absolute; inset: 0; display: grid; place-items: center; color: #07090c;
}
.submit .spinner-btn[hidden] { display: none !important; }
.submit .spinner-btn::after {
  content: ""; width: 16px; height: 16px;
  border: 2px solid rgba(7,9,12,0.25); border-top-color: #07090c;
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.footer-cta {
  margin-top: 28px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.footer-cta-text {
  font-family: "JetBrains Mono", monospace;
  font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--fg-mute);
}
.footer-cta-actions { display: flex; gap: 8px; }
.cta {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 16px; border-radius: 99px;
  font: 500 12.5px/1 "Space Grotesk", sans-serif;
  text-decoration: none; transition: all .2s;
}
.cta-primary {
  background: rgba(255,255,255,0.04); border: 1px solid var(--line-strong); color: var(--fg);
}
.cta-primary:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
.cta-ghost { background: transparent; border: 1px solid var(--line); color: var(--fg-dim); }
.cta-ghost:hover { border-color: var(--line-strong); color: var(--fg); }

/* ── Connect / Controls ── */
.ctrl-card {
  width: 100%; max-width: 380px;
  background: linear-gradient(180deg, rgba(20,26,34,0.78), rgba(12,17,23,0.78));
  border: 1px solid var(--line); border-radius: 18px;
  backdrop-filter: blur(14px);
  box-shadow: 0 30px 80px rgba(0,0,0,0.55);
  overflow: hidden;
}
.scooter-stage {
  padding: 2rem 1.5rem 1.25rem; text-align: center;
  background: linear-gradient(180deg, rgba(182,255,60,0.04) 0%, transparent 60%);
  border-bottom: 1px solid var(--line);
  position: relative;
}
.scooter-ring {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -48%);
  width: 170px; height: 170px;
  border-radius: 50%; border: 1px solid rgba(182,255,60,0.1);
  pointer-events: none;
}
.scooter-ring::before {
  content: ''; position: absolute; inset: 12px;
  border-radius: 50%; border: 1px solid rgba(182,255,60,0.06);
}
.scooter-svg { position: relative; z-index: 1; margin-bottom: 1rem; }
.scooter-title-row { display: flex; align-items: center; justify-content: center; gap: 0.45rem; }
.scooter-title { font-size: 1.05rem; font-weight: 700; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--fg-mute); flex-shrink: 0; transition: background .3s; }
.dot.live { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); animation: blink 2.2s ease-in-out infinite; }
.dot.busy { background: var(--yellow); animation: blink 0.75s ease-in-out infinite; }
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.35; } }
.scooter-sub { font-size: 0.76rem; color: var(--fg-mute); margin-top: 0.25rem; }

.seg {
  display: flex; margin: 0.75rem 1rem 0;
  background: rgba(255,255,255,0.04); border-radius: 9px; padding: 3px; gap: 3px;
}
.seg-btn {
  flex: 1; border: none; background: none; border-radius: 7px;
  color: var(--fg-mute); font-size: 0.76rem; font-weight: 600;
  padding: 0.4rem 0.5rem; cursor: pointer; transition: all .15s;
  font-family: "Space Grotesk", sans-serif;
}
.seg-btn.active { background: rgba(255,255,255,0.08); color: var(--fg); }

.actions { padding: 1rem; display: flex; flex-direction: column; gap: 0.55rem; }
.btn {
  border: none; border-radius: 10px; font-size: 0.92rem; font-weight: 700;
  padding: 0.8rem 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  transition: opacity .15s, transform .1s; letter-spacing: 0.15px;
  font-family: "Space Grotesk", sans-serif;
}
.btn:active { transform: scale(0.97); opacity: 0.88; }
.btn-green {
  background: var(--accent); color: #07090c;
  box-shadow: 0 4px 16px rgba(182,255,60,0.22);
}
.btn-flat { background: rgba(255,255,255,0.06); color: var(--fg); border: 1px solid var(--line); }
.btn-ghost { background: transparent; color: var(--fg-mute); border: 1px solid var(--line); }
.btn-row { display: flex; gap: 0.55rem; }
.btn-row .btn { flex: 1; }
.btn-out {
  margin-top: 0.75rem;
  background: transparent; color: var(--fg-mute);
  border: 1px solid var(--line); border-radius: 10px;
  font-size: 0.85rem; font-weight: 600; padding: 0.7rem 1rem;
  cursor: pointer; width: 100%; max-width: 380px;
  display: flex; align-items: center; justify-content: center; gap: 0.4rem;
  font-family: "Space Grotesk", sans-serif;
  transition: color .15s, border-color .15s;
}
.btn-out:hover { color: var(--fg); border-color: var(--line-strong); }

.bat-section { display: none; padding: 0.8rem 1rem; border-top: 1px solid var(--line); }
.bat-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem; }
.bat-label { font-size: 0.72rem; color: var(--fg-mute); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; font-family: "JetBrains Mono", monospace; }
.bat-pct { font-size: 0.9rem; font-weight: 800; }
.bat-track { height: 5px; background: rgba(255,255,255,0.06); border-radius: 99px; overflow: hidden; }
.bat-fill { height: 100%; border-radius: 99px; background: var(--accent); transition: width .7s ease, background .5s; }

.status-bar { display: flex; align-items: center; justify-content: space-between; padding: 0.55rem 1rem 0; }
.status-label { font-size: 0.72rem; color: var(--fg-mute); font-family: "JetBrains Mono", monospace; }
.btn-refresh {
  background: none; border: none; color: var(--fg-mute); font-size: 0.75rem;
  cursor: pointer; padding: 0.2rem 0.4rem; border-radius: 6px;
  transition: color .15s, background .15s;
}
.btn-refresh:hover { color: var(--accent); background: var(--accent-soft); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 2rem; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: rgba(8,12,16,0.9); border: 1px solid var(--line-strong); border-radius: 99px;
  padding: 0.6rem 1.4rem; font-size: 0.82rem; font-weight: 600;
  white-space: nowrap; transition: transform .32s cubic-bezier(0.34,1.56,0.64,1), opacity .28s;
  opacity: 0; z-index: 200; pointer-events: none;
  font-family: "Space Grotesk", sans-serif;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.ok   { border-color: var(--accent); color: var(--accent); }
.toast.err  { border-color: var(--danger); color: var(--danger); }
.toast.info { color: var(--fg); }

/* ── Spinner (in buttons) ── */
.spin {
  width: 17px; height: 17px;
  border: 2px solid rgba(255,255,255,0.2); border-top-color: currentColor;
  border-radius: 50%; animation: spin .65s linear infinite; flex-shrink: 0;
}
.btn-green .spin { border-color: rgba(7,9,12,0.2); border-top-color: #07090c; }

@media (max-width: 420px) { .panel { padding: 22px 20px 22px; } }
</style>
</head>
<body>

<!-- ── Background (login only) ── -->
<div class="bg" id="bg" aria-hidden="true">
  <div class="orb"></div>
  <div class="bg-grid"></div>
  <div class="scooter-wrap" id="scooterWrap">
    <svg viewBox="0 0 1100 620" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.4">
      <line x1="0" y1="500" x2="1100" y2="500" stroke="rgba(255,255,255,0.08)"/>
      <circle cx="280" cy="470" r="80" stroke="rgba(255,255,255,0.22)"/>
      <circle cx="280" cy="470" r="40" stroke="rgba(255,255,255,0.12)"/>
      <circle cx="280" cy="470" r="6" fill="rgba(255,255,255,0.4)" stroke="none"/>
      <circle cx="780" cy="470" r="80" stroke="rgba(255,255,255,0.22)"/>
      <circle cx="780" cy="470" r="40" stroke="rgba(255,255,255,0.12)"/>
      <circle cx="780" cy="470" r="6" fill="rgba(255,255,255,0.4)" stroke="none"/>
      <path d="M 220 460 L 740 460 L 760 470 L 240 470 Z" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.22)"/>
      <line x1="320" y1="460" x2="700" y2="460" stroke="rgba(182,255,60,0.5)" stroke-width="2"/>
      <path d="M 770 470 L 820 220 L 840 220 L 790 470 Z" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.22)"/>
      <line x1="760" y1="220" x2="900" y2="220" stroke="rgba(255,255,255,0.3)" stroke-width="3" stroke-linecap="round"/>
      <circle cx="760" cy="220" r="6" fill="rgba(255,255,255,0.4)" stroke="none"/>
      <circle cx="900" cy="220" r="6" fill="rgba(255,255,255,0.4)" stroke="none"/>
      <circle cx="830" cy="240" r="10" fill="rgba(182,255,60,0.5)" stroke="rgba(182,255,60,0.8)"/>
      <ellipse cx="280" cy="555" rx="100" ry="6" fill="rgba(182,255,60,0.08)" stroke="none"/>
      <ellipse cx="780" cy="555" rx="100" ry="6" fill="rgba(182,255,60,0.08)" stroke="none"/>
    </svg>
  </div>
  <div class="bg-scan"></div>
</div>

<!-- ── Topbar ── -->
<div class="topbar">
  <div class="brand">
    <div class="brand-mark">R</div>
    <div class="brand-name">Ride<b>Vault</b></div>
  </div>
  <div class="top-right">
    <span><span class="status-dot"></span>SECURE · BLE</span>
    <span id="clock">00:00:00 UTC</span>
  </div>
</div>

<!-- ── LOGIN ── -->
<div class="section visible" id="sec-login">
  <div class="stage">
    <div class="hero">
      <h1 class="wordmark">Ride<span class="v">Vault</span></h1>
      <p class="tagline">Secure access · Session gateway</p>

      <div class="card-login">
        <div class="panel">
          <form id="form" >
